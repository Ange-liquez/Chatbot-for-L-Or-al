<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oréal AI Routine Builder</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header class="hero">
        <h1>L'Oréal AI Routine Builder</h1>
        <p class="subtitle">
          Browse products, select your favorites, and generate a personalized routine with AI.
        </p>
      </header>

      <section class="controls">
        <label for="categoryFilter" class="label">Category</label>
        <select id="categoryFilter">
          <option value="">Select Category</option>
          <option value="cleanser">Cleanser</option>
          <option value="moisturizer">Moisturizer</option>
          <option value="skincare">Skincare</option>
          <option value="haircare">Haircare</option>
          <option value="makeup">Makeup</option>
          <option value="fragrance">Fragrance</option>
          <option value="hair color">Hair Color</option>
          <option value="hair styling">Hair Styling</option>
          <option value="men's grooming">Men's Grooming</option>
          <option value="suncare">Suncare</option>
        </select>
      </section>

      <section class="panel">
        <div id="productsContainer" class="products-grid">
          <p class="empty-state">Choose a category to see products.</p>
        </div>
      </section>

      <section class="panel">
        <div class="section-header">
          <h2>Selected Products</h2>
          <button id="clearSelections" type="button" class="secondary-btn">
            Clear All
          </button>
        </div>
        <div id="selectedProducts" class="selected-products">
          <p class="empty-state">No products selected yet.</p>
        </div>
        <button id="generateRoutine" type="button" class="primary-btn">
          Generate Routine
        </button>
      </section>

      <section class="panel">
        <h2>Routine Chat</h2>
        <div id="chatWindow" class="chat-window"></div>
        <form id="chatForm" class="chat-form">
          <input
            id="userInput"
            type="text"
            placeholder="Ask about your routine..."
            autocomplete="off"
            required
          />
          <button type="submit">Send</button>
        </form>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
