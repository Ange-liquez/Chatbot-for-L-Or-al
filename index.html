<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L’Oréal Beauty Assistant</title>

    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <header class="site-header">
        <h1 class="site-title">L’Oréal Beauty Assistant</h1>
        <p>
          Ask about skincare, makeup, haircare, fragrance, and personalized beauty routines.
        </p>
      </header>

      <main>
        <section class="chatbox">
          <div id="chatWindow" class="chat-window" aria-live="polite"></div>

          <form id="chatForm" class="chat-form">
            <label for="userInput" class="visually-hidden">Ask a question</label>
            <input
              id="userInput"
              name="userInput"
              type="text"
              placeholder="Ask about L’Oréal products or beauty routines..."
              autocomplete="off"
              required
            />
            <button type="submit" id="sendBtn">
              <span class="material-icons">arrow_upward</span>
              <span class="visually-hidden">Send</span>
            </button>
          </form>
        </section>
      </main>

      <footer class="site-footer">
        <p>&copy; 2025 L’Oréal Beauty Assistant</p>
        <nav>
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact</a>
        </nav>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
