<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L’Oréal Smart Beauty Advisor</title>

    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <header class="site-header">
        <div class="logo-wrap">
          <img
            src="loreal-logo.png"
            alt="L'Oréal logo"
            class="logo"
            onerror="this.style.display='none'; document.querySelector('.logo-text').style.display='block';"
          />
          <div class="logo-text" style="display:none;">L’ORÉAL</div>
        </div>

        <h1 class="site-title">Smart Beauty Advisor</h1>
        <p class="site-subtitle">
          Discover L’Oréal products, routines, and personalized beauty guidance
        </p>
      </header>

      <main>
        <section class="chatbox">
          <div class="chatbox-top">
            <div>
              <h2>Beauty Chat</h2>
              <p>Ask about skincare, makeup, haircare, fragrance, and routines.</p>
            </div>
            <span class="status-badge">AI Powered</span>
          </div>

          <div id="questionPreview" class="question-preview hidden"></div>

          <div id="chatWindow" class="chat-window"></div>

          <form id="chatForm" class="chat-form">
            <input
              id="userInput"
              type="text"
              placeholder="Ask me about L’Oréal products or routines..."
              autocomplete="off"
              maxlength="500"
              required
            />
            <button type="submit" id="sendBtn" aria-label="Send message">
              <span class="material-icons">send</span>
            </button>
          </form>

          <p id="statusText" class="status-text"></p>
        </section>
      </main>

      <footer class="site-footer">
        <p>© 2026 L’Oréal-inspired student project</p>
        <nav>
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact</a>
        </nav>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
