<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oréal Product-Aware Routine Builder</title>

    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <!------- Header / Branding ------->
      <header class="site-header">
        <h1 class="site-title">L'Oréal Product-Aware Routine Builder</h1>
        <p class="site-subtitle">
          Browse products, select your favorites, generate a personalized beauty
          routine, and ask follow-up questions with AI.
        </p>
      </header>

      <main>
        <!------- Product Controls ------->
        <section class="controls-section">
          <div class="filter-group">
            <label for="categoryFilter">Filter by Category</label>
            <select id="categoryFilter" name="categoryFilter">
              <option value="all">All Categories</option>
              <option value="skincare">Skincare</option>
              <option value="haircare">Haircare</option>
              <option value="makeup">Makeup</option>
              <option value="fragrance">Fragrance</option>
            </select>
          </div>

          <div class="filter-group">
            <label for="searchInput">Search Products</label>
            <input
              type="text"
              id="searchInput"
              name="searchInput"
              placeholder="Search by name, brand, or keyword..."
            />
          </div>
        </section>

        <!------- Product Grid ------->
        <section class="products-section">
          <h2 class="section-title">Products</h2>
          <div id="productGrid" class="product-grid">
            <!-- product cards inserted with JS -->
          </div>
        </section>

        <!------- Selected Products ------->
        <section class="selected-section">
          <div class="selected-header">
            <h2 class="section-title">Selected Products</h2>
            <button type="button" id="clearSelectedBtn" class="secondary-btn">
              Clear All
            </button>
          </div>

          <ul id="selectedProductsList" class="selected-products-list">
            <!-- selected products inserted with JS -->
          </ul>

          <div class="generate-wrapper">
            <button type="button" id="generateRoutineBtn" class="primary-btn">
              Generate Routine
            </button>
          </div>
        </section>

        <!------- Chat Area ------->
        <section class="chatbox">
          <h2 class="section-title">Beauty Chat</h2>

          <div id="chatWindow" class="chat-window">
            <!-- messages will be appended here via JS -->
          </div>

          <form id="chatForm" class="chat-form">
            <label for="userInput" class="visually-hidden">Message</label>
            <input
              id="userInput"
              name="userInput"
              type="text"
              placeholder="Ask a follow-up question about your routine..."
              autocomplete="off"
              required
            />
            <button type="submit" id="sendBtn">
              <span class="material-icons">send</span>
              <span class="visually-hidden">Send</span>
            </button>
          </form>
        </section>
      </main>

      <!------- Footer Links ------->
      <footer class="site-footer">
        <p>&copy; 2026 L'Oréal AI Student Project. All rights reserved.</p>
        <nav>
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact</a>
        </nav>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
